spring.application.name=Zaikabox-Api

spring.data.mongodb.uri=${DB_URI:mongodb://localhost:27017/zaikabox}
spring.data.mongodb.database=zaikabox
spring.cloud.azure.storage.blob.enabled=${AZURE_BLOB_ENABLED:false}
spring.cloud.azure.storage.fileshare.enabled=false
spring.cloud.azure.storage.queue.enabled=false
spring.cloud.azure.storage.connection-string=${AZURE_CONNECTION_STRING:UseDevelopmentStorage=true}
spring.cloud.azure.storage.blob.container-name=${AZURE_CONTAINER_NAME:zaikabox-images}

logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{correlationId:-NA}] %logger{36} - %msg%n

# Enable debug logging for MongoDB queries
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoOperations=DEBUG
logging.level.org.mongodb.driver=INFO

jwt.secret.key=${JWT_SECRET:c3VwZXJzZWNyZXQxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# Mail Service Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:no-reply@example.com}
spring.mail.password=${MAIL_PASSWORD:dummy-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=yjamal12feb@gmail.com

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.deepLinking=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.syntaxHighlight.activated=true

# razorpay - configurations
razorpay.key.id=${RAZORPAY_KEY:rzp_test_key}
razorpay.secret.key=${RAZORPAY_SECRET:rzp_test_secret}
razorpay.currency=INR
razorpay.company-name=Zaikabox

# Gemini API
gemini.api.key=${GEMINI_API_KEY:dummy-gemini-key}

# Actuator / Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
