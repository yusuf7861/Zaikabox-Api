version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: zaikabox-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: zaikabox
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zaikabox-api
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URI: mongodb://mongo:27017/zaikabox

volumes:
  mongo_data:
